<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .map-container {
            text-align: center;
            max-width: 100%;
        }

        .main-map {
            max-width: 100%;
            max-height: 80vh;
            height: auto;
            border: 2px solid #333;
            cursor: pointer;
        }



        .instructions {
            text-align: center;
            margin-bottom: 20px;
            color: #666;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.0/dist/fancybox/fancybox.css"/>
</head>
<body>
    <div class="instructions">
        <h1>1978 Interactive Tax Map</h1>
        <p>Click on the circled numbers on the map to view detailed plates</p>
    </div>

    <div class="map-container">
        <img src="./assets/1978-images/1978-index-map.jpg" alt="1978 Glen Rock Tax Map Index with clickable numbered plates" usemap="#mapcoords" class="main-map" />
        <map name="mapcoords">
            <area shape="rect" coords="" href="./assets/1978-images/1978-index-map.jpg" data-fancybox="gallery" alt="Index Map">
            <area shape="rect" coords="634, 266, 653, 281" href="./assets/1978-images/1978-plate-02.jpg" data-fancybox="gallery" alt="Plate 2">
            <area shape="rect" coords="585, 198, 603, 212" href="./assets/1978-images/1978-plate-03.jpg" data-fancybox="gallery" alt="Plate 3">
            <area shape="rect" coords="527, 223, 545, 240" href="./assets/1978-images/1978-plate-04.jpg" data-fancybox="gallery" alt="Plate 4">
            <area shape="rect" coords="476, 206, 496, 223" href="./assets/1978-images/1978-plate-05.jpg" data-fancybox="gallery" alt="Plate 5">
            <area shape="rect" coords="417, 169, 434, 187" href="./assets/1978-images/1978-plate-06.jpg" data-fancybox="gallery" alt="Plate 6">
            <area shape="rect" coords="387, 229, 401, 242" href="./assets/1978-images/1978-plate-07.jpg" data-fancybox="gallery" alt="Plate 7">
            <area shape="rect" coords="368, 293, 388, 313" href="./assets/1978-images/1978-plate-08.jpg" data-fancybox="gallery" alt="Plate 8">
            <area shape="rect" coords="325, 392, 345, 412" href="./assets/1978-images/1978-plate-09.jpg" data-fancybox="gallery" alt="Plate 9">
            <area shape="rect" coords="410, 375, 430, 395" href="./assets/1978-images/1978-plate-10.jpg" data-fancybox="gallery" alt="Plate 10">
            <area shape="rect" coords="461, 324, 481, 344" href="./assets/1978-images/1978-plate-11.jpg" data-fancybox="gallery" alt="Plate 11">
            <area shape="rect" coords="580, 300, 600, 320" href="./assets/1978-images/1978-plate-12.jpg" data-fancybox="gallery" alt="Plate 12">
            <area shape="rect" coords="730, 320, 750, 340" href="./assets/1978-images/1978-plate-13.jpg" data-fancybox="gallery" alt="Plate 13">
            <area shape="rect" coords="665, 363, 685, 383" href="./assets/1978-images/1978-plate-14.jpg" data-fancybox="gallery" alt="Plate 14">
            <area shape="rect" coords="589, 369, 609, 389" href="./assets/1978-images/1978-plate-15.jpg" data-fancybox="gallery" alt="Plate 15">
            <area shape="rect" coords="504, 379, 524, 399" href="./assets/1978-images/1978-plate-16.jpg" data-fancybox="gallery" alt="Plate 16">
            <area shape="rect" coords="421, 449, 441, 469" href="./assets/1978-images/1978-plate-17.jpg" data-fancybox="gallery" alt="Plate 17">
            <area shape="rect" coords="368, 441, 388, 461" href="./assets/1978-images/1978-plate-18.jpg" data-fancybox="gallery" alt="Plate 18">
            <area shape="rect" coords="286, 433, 306, 453" href="./assets/1978-images/1978-plate-19.jpg" data-fancybox="gallery" alt="Plate 19">
            <area shape="rect" coords="498, 485, 518, 505" href="./assets/1978-images/1978-plate-20.jpg" data-fancybox="gallery" alt="Plate 20">

            <area shape="rect" coords="750, 396, 770, 416" href="./assets/1978-images/1978-plate-23.jpg" data-fancybox="gallery" alt="Plate 23">
            <area shape="rect" coords="771, 507, 791, 527" href="./assets/1978-images/1978-plate-24.jpg" data-fancybox="gallery" alt="Plate 24">
        </map>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.0/dist/fancybox/fancybox.umd.js"></script>
    <script>
        Fancybox.bind('[data-fancybox]', {});
        
        function scaleImageMap() {
            const img = document.querySelector('.main-map');
            const map = document.querySelector('map[name="mapcoords"]');
            const areas = map.querySelectorAll('area');
            
            img.onload = function() {
                const scaleX = img.clientWidth / img.naturalWidth;
                const scaleY = img.clientHeight / img.naturalHeight;
                
                areas.forEach(area => {
                    const coords = area.dataset.originalCoords || area.getAttribute('coords');
                    if (!area.dataset.originalCoords) {
                        area.dataset.originalCoords = coords;
                    }
                    
                    const coordsArray = coords.split(',').map(Number);
                    const scaledCoords = coordsArray.map((coord, index) => {
                        return Math.round(coord * (index % 2 === 0 ? scaleX : scaleY));
                    });
                    
                    area.setAttribute('coords', scaledCoords.join(','));
                });
            };
            
            if (img.complete) img.onload();
        }
        
        scaleImageMap();
        window.addEventListener('resize', scaleImageMap);
    </script>
</body>
</html>
